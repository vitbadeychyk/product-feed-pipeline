name: Update product feed

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch supplier feed
        run: python scripts/fetch_supplier_feed.py

      - name: Export processed feed
        run: python scripts/export_feed.py

      - name: Export Epicentr updates feed
        run: python scripts/export_epicentr_updates_with_history.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/fetch_meta.json state/known_products.json data/raw/ data/output/
          git diff --cached --quiet || git commit -m "Auto-update supplier feed"
          git push
